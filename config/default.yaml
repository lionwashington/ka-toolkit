# Knowledge Assistant Configuration

# Which channel daemon is active: telegram | lark (default telegram).
# Single source of truth — every ka command reads the daemon type from here.
# Set at install time with `./install.sh --channel-kind=telegram|lark`; the
# port itself lives in runtime/<kind>-daemon/config.json (http_port).
channel_kind: telegram

# Knowledge base location (absolute path)
knowledge_base_path: ~/knowledge-base/

# Runtime state directory (watermarks, etc.)
state_dir: ~/.knowledge-assistant/state

# Distillation settings
distiller:
  # Auto-distill interval (e.g., "2h", "30m", "1d")
  interval: "2h"

# RAG retrieval
retrieval:
  # Max search results
  max_results: 5
  # Minimum similarity score (0-1)
  min_score: 0.7
