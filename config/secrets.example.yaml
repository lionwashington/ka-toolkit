# Knowledge Assistant Secrets
# Copy to ~/.knowledge-assistant/config/secrets.yaml and fill in your values.
# This file should NOT be committed to git.

# Channel daemon secrets (per kind). Fill in the block matching `channel_kind`
# in config.yaml; the daemon reads its token/credentials ONLY from here. The
# non-secret ports/tuning live in config.yaml under the same channels.<kind> key.
# channels:
#   telegram:
#     token: "123456:YOUR_TELEGRAM_BOT_TOKEN"   # from @BotFather
#     owner_chat_id: "YOUR_TELEGRAM_CHAT_ID"    # only this user may reach the daemon
#   lark:
#     self_open_id: "ou_REPLACE_WITH_YOUR_OPEN_ID"
#     groups:
#       oc_REPLACE_WITH_GROUP_CHAT_ID:
#         name: "Example Group"
#         webhook_url: "https://open.larksuite.com/open-apis/bot/v2/hook/REPLACE_WITH_YOUR_WEBHOOK"
#         poll_interval_seconds: 5

# Amap (Gaode Maps) API key
# Get from: https://lbs.amap.com/
# amap_api_key: your_amap_api_key_here

# COROS fitness tracker credentials
# coros:
#   api_url: https://teamcnapi.coros.com
#   email: your@email.com
#   password: your_password
