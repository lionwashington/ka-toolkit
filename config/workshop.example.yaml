# config/workshop.example.yaml — copy to ~/.knowledge-assistant/config/workshop.yaml and edit.
#
# Declares the workshop agents. `ka start` (forwards to `ka workshop`, workshop/ops/workshop.sh) reads this file:
# it bootstraps the lead pane, then `ka spawn-mates` asks the lead to spawn the
# rest (each in its own tmux pane via the Agent tool).
#
# Every agent — the lead and the mates — is ONE entry under `mates:`. The lead
# is just the entry marked `main: true`.

session: workshop

# Agent runtime for every entry unless overridden per-entry.
# Currently only `cc` (Claude Code) is implemented — `codex` and `gemini`
# are reserved names for future adapters, see docs/KA_CLI_RUNTIME_DESIGN.md.
# Omit this key to accept the default (cc).
# runtime: cc

# Each entry supports these keys:
#   name         (required) agent / channel name
#   cwd          (required) working directory; must exist before `ka start`.
#                ~ is expanded. The lead refuses to start on a missing cwd.
#   args         (optional) extra CLI args passed verbatim to the agent.
#   description  (optional) human note; shown by `ka status` for mates.
#   main         (optional) default FALSE. Exactly one entry sets `main: true`
#                — the lead, bound to the daemon's `main` channel. The channel
#                goes through the channel daemon (telegram/lark), not a plugin.
#   default      (optional) default TRUE. `false` = optional: not spawned by a
#                bare `ka workshop`; start it explicitly (`ka workshop --all`
#                or `ka workshop start <name>`).
mates:
  - name: main
    cwd: ~/workspace/your-workspace
    main: true
    # args:
    #   - --model
    #   - claude-opus-4-8

  # - name: helper
  #   cwd: ~/workspace/helper
  #   description: example mate
  #   default: false
