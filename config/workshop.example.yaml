# config/workshop.example.yaml — copy to ~/.knowledge-assistant/config/workshop.yaml and edit.
#
# Declares the workshop agents. `ka start` (forwards to `ka workshop`,
# workshop/ops/workshop.sh) reads this file and launches each selected entry as
# an independent runtime process in its own tmux pane or window.
#
# Every agent is an equivalent entry under `mates:`. `main: true` is optional
# and changes only that entry's Channel name to `main`.

session: workshop

# Agent runtime for every entry unless overridden per-entry.
# Supported runtimes are `cc` (Claude Code) and `codex`. `gemini` remains
# reserved and fails closed, see docs/KA_CLI_RUNTIME_DESIGN.md.
# Omit this key to accept the default (cc).
# runtime: cc

# Each entry supports these keys:
#   name         (required) agent / channel name
#   cwd          (required) working directory; must exist before `ka start`.
#                ~ is expanded. Any entry refuses to start on a missing cwd.
#   args         (optional) extra CLI args passed verbatim to the agent.
#   description  (optional) human note; shown by `ka status` for mates.
#   main         (optional) default FALSE. Zero or one entry may set true. It is
#                only a channel alias (`main`), not a privileged lifecycle role.
#   default      (optional) default TRUE. `false` = optional: not spawned by a
#                bare `ka workshop`; start it explicitly (`ka workshop --all`
#                or `ka workshop start <name>`).
mates:
  - name: project-one
    cwd: ~/workspace/project-one
    # main: true            # optional alias for the daemon's `main` channel
    # args:
    #   - --model
    #   - claude-opus-4-8

  # - name: helper
  #   cwd: ~/workspace/helper
  #   description: example mate
  #   default: false

  # Workshop starts a per-mate Codex App Server and registers its loopback endpoint
  # with the active Channel daemon. Channel never reads this file. An exact-cwd
  # existing session is resumed; if none exists, the TUI creates a fresh canonical
  # thread and Workshop adopts it automatically.
  # - name: codex-reviewer
  #   cwd: ~/workspace/your-workspace
  #   runtime: codex
  #   default: false
