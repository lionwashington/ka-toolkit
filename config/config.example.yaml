# Knowledge Assistant Configuration

# Which channel daemon is active: telegram | lark (default telegram).
# Single source of truth — every ka command reads the daemon type from here.
# Set at install time with `./install.sh --channel-kind=telegram|lark`.
channel_kind: telegram

# Channel daemon settings — NON-SECRET only (ports + tuning). The active kind is
# `channel_kind` above; both blocks may be present (only the active one is used).
# Secrets (bot token, owner chat id, lark webhooks) live in secrets.yaml under
# the SAME channels.<kind> keys — never here.
channels:
  telegram:
    port: 9877
    poll_timeout: 25            # getUpdates long-poll seconds
  lark:
    port: 9876
    poll_interval_seconds: 1    # base poll tick (seconds)
    page_size: 10               # lark-cli chat-messages-list page size
    lark_cli_bin: lark-cli      # lark-cli binary (path or $PATH name)

# Knowledge base location (absolute path)
knowledge_base_path: ~/knowledge-base/

# Runtime state directory (watermarks, etc.)
state_dir: ~/.knowledge-assistant/state

# Distillation settings
distiller:
  # Auto-distill interval (e.g., "2h", "30m", "1d")
  interval: "2h"
  # Headless executor: cc (default) or codex
  runtime: cc

# RAG retrieval
retrieval:
  # Max search results
  max_results: 5
  # Minimum similarity score (0-1)
  min_score: 0.7
